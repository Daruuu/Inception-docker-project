listen=YES
listen_ipv6=NO
anonymous_enable=NO
local_enable=YES
write_enable=YES
local_umask=022
dirmessage_enable=YES
xferlog_enable=YES
connect_from_port_20=YES

# Chroot (Encerrar al usuario en su carpeta de WordPress)
chroot_local_user=YES
allow_writeable_chroot=YES

# Modo Pasivo (Para que funcione con el firewall de Docker)
pasv_enable=YES
pasv_addr_resolve=YES
pasv_address=dasalaza.42.fr
pasv_min_port=21100
pasv_max_port=21110

# Solución para errores comunes en Alpine/Docker
seccomp_sandbox=NO
