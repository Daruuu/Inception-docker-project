# ===========================
# SERVICES
# ===========================
services:
  mariadb:
    container_name: mariadb
    image: mariadb:inception
    build:
      context: .
      dockerfile: requirements/mariadb/Dockerfile
    env_file:
      - .env
    secrets:
      - db_password
      - db_root_password
    networks:
      - inception_network
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

  wordpress:
    container_name: wordpress
    image: wordpress:inception
    build:
      context: .
      dockerfile: requirements/wordpress/Dockerfile
    depends_on:
      mariadb:
        condition: service_healthy
    env_file:
      - .env
    secrets:
      - db_password
      - wp_admin_password
      - wp_user_password
    networks:
      - inception_network
    volumes:
      - wordpress_data:/var/www/html/wordpress
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: always

  nginx:
    container_name: nginx
    image: nginx:inception
    build:
      context: .
      dockerfile: requirements/nginx/Dockerfile
    depends_on:
      - wordpress
    ports:
      - "${NGINX_PORT:-443}:443"
    networks:
      - inception_network
    volumes:
      - wordpress_data:/var/www/html/wordpress
    secrets:
      - db_password
    env_file:
      - .env
    restart: always

  redis:
    container_name: redis
    image: redis:inception
    build:
      context: .
      dockerfile: requirements/bonus/redis/Dockerfile
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - inception_network
    restart: always

  ftp:
    container_name: ftp
    image: ftp:inception
    build:
      context: .
      dockerfile: requirements/bonus/ftp/Dockerfile
    ports:
      - "21:21"
      - "21100-21110:21100-21110"   # Rango de puertos para transferencia de datos (Modo Pasivo)
    env_file:
      - .env
    environment:
      - FTP_USER=${WP_USER}
    volumes:
      - wordpress_data:/var/www/html/wordpress
    networks:
      - inception_network
    secrets:
      - wp_user_password
      - ftp_password
    depends_on:
      wordpress:
        condition: service_healthy
    restart: always

  adminer:
    container_name: adminer
    image: adminer:inception
    build:
      context: .
      dockerfile: requirements/bonus/adminer/Dockerfile
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - inception_network
    restart: always

  netdata:
    container_name: netdata
    image: netdata:inception
    build:
      context: .
      dockerfile: requirements/bonus/netdata/Dockerfile
    hostname: netdata
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor=unconfined
    networks:
      - inception_network
    volumes:
      - netdata_config:/etc/netdata
      - netdata_lib:/var/lib/netdata
      - netdata_cache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: always

  static_site:
    image: static_site
    build:
      context: .
      dockerfile: requirements/bonus/static_site/Dockerfile
    container_name: static_site
    networks:
      - inception_network
    restart: always

# ----------------------------------------
# Global Configuration of Networks 
# ----------------------------------------
networks:
  inception_network:
    driver: bridge

# ----------------------------------------
# Global Configuration of Volumes 
# ----------------------------------------
volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${USER}/data/mariadb
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${USER}/data/wordpress
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${USER}/data/redis
  static_site_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${USER}/data/static
  netdata_config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${USER}/data/netdata/config
  netdata_lib:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${USER}/data/netdata/lib
  netdata_cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${USER}/data/netdata/cache

# ----------------------------------------
# Global Configuration of Secrets
# ----------------------------------------
secrets:
  db_password:
    file: secrets/db_password.txt
  db_root_password:
    file: secrets/db_root_password.txt
  wp_admin_password:
    file: secrets/wp_admin_password.txt
  wp_user_password:
    file: secrets/wp_user_password.txt
  ftp_password:
    file: secrets/ftp_password.txt
